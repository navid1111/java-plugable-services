spring.application.name=bff
server.port=${SERVER_PORT:8080}

# Downstream owning services (reached directly in-cluster; no database sharing).
bff.downstream.tweeter.base-url=${TWEETER_BASE_URL:http://tweeter-service:8080}
bff.downstream.comment.base-url=${COMMENT_BASE_URL:http://comment-service:8080}
bff.downstream.media.base-url=${MEDIA_BASE_URL:http://media-service:8080}

# Strict per-call deadlines and the overall composition deadline.
bff.downstream.connect-timeout=500ms
bff.downstream.read-timeout=1000ms
bff.composition.deadline=1500ms
bff.composition.pool-size=16

management.endpoints.web.exposure.include=health,info,metrics,prometheus
