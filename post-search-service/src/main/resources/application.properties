spring.application.name=post-search-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postsearchdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postsearchuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postsearchpass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration/service
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:platform}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:platform-dev}
# Keep deletion versions long enough to reject late replay; cleanup is reconciliation-controlled.
search.projection.tombstone-retention=${SEARCH_TOMBSTONE_RETENTION:P30D}
post-export.base-url=${POST_EXPORT_BASE_URL:http://tweeter-service:8080}
workload.jwt.issuer=post-search-service
workload.jwt.secret=${WORKLOAD_JWT_SECRET:dev-search-workload-secret-0123456789abcdef}
workload.jwt.trusted-callers=${WORKLOAD_TRUSTED_CALLERS:platform-operator=dev-platform-operator-secret-0123456789abcdef}
