spring.application.name=post-search-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postsearchdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postsearchuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postsearchpass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
