spring.application.name=comment-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/commentsdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:commentsuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:commentspass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:platform}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:platformpass}
workload.jwt.issuer=comment-service
workload.jwt.secret=${WORKLOAD_JWT_SECRET:dev-comment-workload-secret-0123456789abcdef}
jwt.secret=${JWT_SECRET:change-me-super-secret-jwt-signing-key-min-32-bytes-0123456789}
jwt.issuer=${JWT_ISSUER:springboot-auth}
