spring.application.name=comment-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/commentsdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:commentsuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:commentspass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
