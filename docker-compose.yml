services:
  # ---- Postgres: Kong's configuration store ----
  kong-database:
    image: postgres:16-alpine
    container_name: kong-database
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kongpass
    volumes:
      - kong_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kong-net

  # ---- One-shot job: create/upgrade Kong's schema, then exit ----
  kong-migrations:
    image: kong:3.9
    container_name: kong-migrations
    command: kong migrations bootstrap
    depends_on:
      kong-database:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
    restart: on-failure
    networks:
      - kong-net

  # ---- Kong Gateway: the API gateway itself ----
  kong:
    image: kong:3.9
    container_name: kong
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      # Proxy on 8000 (http) / 8443 (https); Admin API on 8001.
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "18000:8000"  # public proxy — clients hit this (host 18000 to avoid a local conflict)
      - "8001:8001"   # admin API — for configuration (keep private in prod)
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - kong-net

  # ---- Postgres for auth (users table) — separate from Kong's DB ----
  users-db:
    image: postgres:16-alpine
    container_name: users-db
    profiles: ["auth", "tweeter", "chat", "turf", "comments", "post-search", "media"]
    environment:
      POSTGRES_USER: appuser
      POSTGRES_DB: appdb
      POSTGRES_PASSWORD: apppass
    volumes:
      - app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kong-net

  # ---- Spring Boot upstream service (not exposed to host directly) ----
  auth-service:
    profiles: ["auth", "tweeter", "chat", "turf", "comments", "post-search", "media"]
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      users-db:
        condition: service_healthy
    environment:
      # Datasource -> the app's own Postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://users-db:5432/appdb
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
      # JWT signing — this SECRET must match the jwt credential secret in kong/setup.sh,
      # and JWT_ISSUER must match that credential's `key`.
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_EXPIRATION_MINUTES: "60"
    expose:
      - "8080"   # reachable only inside kong-net, via Kong
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-net

  # ---- Postgres for the tweeter service (posts + follows) ----
  posts-db:
    image: postgres:16-alpine
    container_name: posts-db
    profiles: ["tweeter"]
    environment:
      POSTGRES_USER: postsuser
      POSTGRES_DB: postsdb
      POSTGRES_PASSWORD: postspass
    volumes:
      - posts_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postsuser -d postsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kong-net

  # ---- Tweeter service: posts, follows, and feed ----
  tweeter-service:
    profiles: ["tweeter"]
    build:
      context: ./tweeter-service
      dockerfile: Dockerfile
    container_name: tweeter-service
    depends_on:
      posts-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://posts-db:5432/postsdb
      SPRING_DATASOURCE_USERNAME: postsuser
      SPRING_DATASOURCE_PASSWORD: postspass
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-net

  # ---- Postgres for the comment service (generic target comments) ----
  comments-db:
    image: postgres:16-alpine
    container_name: comments-db
    profiles: ["comments"]
    environment:
      POSTGRES_USER: commentsuser
      POSTGRES_DB: commentsdb
      POSTGRES_PASSWORD: commentspass
    volumes:
      - comments_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commentsuser -d commentsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kong-net

  # ---- Comment service: reusable comments attached to target references ----
  comment-service:
    profiles: ["comments"]
    build:
      context: ./comment-service
      dockerfile: Dockerfile
    container_name: comment-service
    depends_on:
      comments-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://comments-db:5432/commentsdb
      SPRING_DATASOURCE_USERNAME: commentsuser
      SPRING_DATASOURCE_PASSWORD: commentspass
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-net

  # ---- Postgres for the post search service (manual inverted index) ----
  post-search-db:
    image: postgres:16-alpine
    container_name: post-search-db
    profiles: ["post-search"]
    environment:
      POSTGRES_USER: postsearchuser
      POSTGRES_DB: postsearchdb
      POSTGRES_PASSWORD: postsearchpass
    volumes:
      - post_search_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postsearchuser -d postsearchdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kong-net

  # ---- Post search service: keyword search over indexed post snapshots ----
  post-search-service:
    profiles: ["post-search"]
    build:
      context: ./post-search-service
      dockerfile: Dockerfile
    container_name: post-search-service
    depends_on:
      post-search-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://post-search-db:5432/postsearchdb
      SPRING_DATASOURCE_USERNAME: postsearchuser
      SPRING_DATASOURCE_PASSWORD: postsearchpass
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-net

  # ---- Postgres for the media service (Cloudinary metadata) ----
  media-db:
    image: postgres:16-alpine
    container_name: media-db
    profiles: ["media"]
    environment:
      POSTGRES_USER: ${MEDIA_DB_USERNAME:-mediauser}
      POSTGRES_DB: ${MEDIA_DB_NAME:-mediadb}
      POSTGRES_PASSWORD: ${MEDIA_DB_PASSWORD:-mediapass}
    volumes:
      - media_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kong-net

  # ---- Media service: reusable Cloudinary-backed image/video attachments ----
  media-service:
    profiles: ["media"]
    build:
      context: ./media-service
      dockerfile: Dockerfile
    container_name: media-service
    depends_on:
      media-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://media-db:5432/${MEDIA_DB_NAME:-mediadb}
      SPRING_DATASOURCE_USERNAME: ${MEDIA_DB_USERNAME:-mediauser}
      SPRING_DATASOURCE_PASSWORD: ${MEDIA_DB_PASSWORD:-mediapass}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-pluggable-services-dev}
      MEDIA_MAX_IMAGE_BYTES: ${MEDIA_MAX_IMAGE_BYTES:-10485760}
      MEDIA_MAX_VIDEO_BYTES: ${MEDIA_MAX_VIDEO_BYTES:-104857600}
      MEDIA_ALLOWED_IMAGE_FORMATS: ${MEDIA_ALLOWED_IMAGE_FORMATS:-jpg,jpeg,png,gif,webp}
      MEDIA_ALLOWED_VIDEO_FORMATS: ${MEDIA_ALLOWED_VIDEO_FORMATS:-mp4,mov,webm}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-net

  # ---- Postgres for the chat service (chats + messages + inbox) ----
  chats-db:
    image: postgres:16-alpine
    container_name: chats-db
    profiles: ["chat"]
    environment:
      POSTGRES_USER: chatsuser
      POSTGRES_DB: chatsdb
      POSTGRES_PASSWORD: chatspass
    volumes:
      - chats_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatsuser -d chatsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kong-net

  # ---- WhatsApp-style chat service: REST history + WebSocket delivery ----
  whatsapp-service:
    profiles: ["chat"]
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile
    container_name: whatsapp-service
    depends_on:
      chats-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://chats-db:5432/chatsdb
      SPRING_DATASOURCE_USERNAME: chatsuser
      SPRING_DATASOURCE_PASSWORD: chatspass
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-net

  # ---- Postgres for the turf booking service (venues + slots + bookings) ----
  bookings-db:
    image: postgres:16-alpine
    container_name: bookings-db
    profiles: ["turf"]
    environment:
      POSTGRES_USER: bookingsuser
      POSTGRES_DB: bookingsdb
      POSTGRES_PASSWORD: bookingspass
    volumes:
      - bookings_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookingsuser -d bookingsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kong-net

  # ---- Turf service: venues, slots, and no-double-booking guarantee ----
  turf-service:
    profiles: ["turf"]
    build:
      context: ./turf-service
      dockerfile: Dockerfile
    container_name: turf-service
    depends_on:
      bookings-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://bookings-db:5432/bookingsdb
      SPRING_DATASOURCE_USERNAME: bookingsuser
      SPRING_DATASOURCE_PASSWORD: bookingspass
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-net

volumes:
  kong_data:
  app_data:
  posts_data:
  comments_data:
  post_search_data:
  media_data:
  chats_data:
  bookings_data:

networks:
  kong-net:
    driver: bridge
