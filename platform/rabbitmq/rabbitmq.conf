# Platform RabbitMQ baseline configuration.
# Dev uses the RABBITMQ_DEFAULT_USER / RABBITMQ_DEFAULT_PASS env vars for the admin account.

default_vhost = /
management.tcp.port = 15672
loopback_users.guest = false

# The local image exposes plaintext AMQP only inside the Compose network.
# Production must override this file to disable TCP after enabling TLS below.
listeners.tcp.default = 5672

# --- Per-service credentials hook (production) ---
# Provision least-privilege users/vhosts per service by loading definitions on boot.
# When enabled, the admin user must be defined in definitions.json (the env default user
# is skipped once definitions are present).
# load_definitions = /etc/rabbitmq/definitions.json

# --- TLS hook (production) ---
# Mount certificates into /etc/rabbitmq/certs and enable the TLS listener:
# listeners.ssl.default = 5671
# ssl_options.cacertfile = /etc/rabbitmq/certs/ca.pem
# ssl_options.certfile   = /etc/rabbitmq/certs/server.pem
# ssl_options.keyfile    = /etc/rabbitmq/certs/server-key.pem
# ssl_options.verify     = verify_peer
# ssl_options.fail_if_no_peer_cert = true
