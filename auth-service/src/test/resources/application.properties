# Test profile: in-memory H2 instead of Postgres so tests run anywhere
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
workload.jwt.trusted-callers=test-service=test-workload-secret-that-is-at-least-32-bytes

jwt.secret=test-secret-key-for-lab-analysis-min-32-bytes-x
jwt.issuer=springboot-auth
jwt.expiration-minutes=60
