spring.application.name=demo

# ---- Datasource (values come from env in docker-compose; defaults for local runs) ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:appuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:apppass}

# ---- JPA / Hibernate ----
# update = auto-create/evolve the schema from entities (fine for dev; use migrations in prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ---- JWT signing (must stay in sync with Kong's jwt credential) ----
jwt.secret=${JWT_SECRET:change-me-super-secret-jwt-signing-key-min-32-bytes-0123456789}
jwt.issuer=${JWT_ISSUER:springboot-auth}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration/service
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.username=${RABBITMQ_USERNAME:platform}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:platform-dev}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
workload.jwt.trusted-callers=${WORKLOAD_TRUSTED_CALLERS:tweeter-service=dev-tweeter-workload-secret-0123456789abcdef,post-search-service=dev-search-workload-secret-0123456789abcdef,comment-service=dev-comment-workload-secret-0123456789abcdef,media-service=dev-media-workload-secret-0123456789abcdef}
