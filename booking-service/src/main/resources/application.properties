spring.application.name=booking-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookingsdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bookingsuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bookingspass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# RabbitMQ: confirmed, mandatory, persistent publishing for the outbox relay.
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.username=${RABBITMQ_USERNAME:platform}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:platformpass}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true
booking.messaging.relay-enabled=${BOOKING_MESSAGING_RELAY_ENABLED:true}
