services:
  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    profiles: ["leetcode"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-platform}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-platformpass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [kong-net]
  leetcode-db:
    image: postgres:16-alpine
    container_name: leetcode-db
    profiles: ["leetcode"]
    environment:
      POSTGRES_USER: leetcodeuser
      POSTGRES_DB: leetcodedb
      POSTGRES_PASSWORD: leetcodepass
    volumes:
      - leetcode_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leetcodeuser -d leetcodedb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - kong-net

  leetcode-service:
    profiles: ["leetcode"]
    image: leetcode-service:latest
    container_name: leetcode-service
    depends_on:
      leetcode-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://leetcode-db:5432/leetcodedb
      SPRING_DATASOURCE_USERNAME: leetcodeuser
      SPRING_DATASOURCE_PASSWORD: leetcodepass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-platform}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-platformpass}
      LEETCODE_ROLE: api
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kong-net
  leetcode-judge-worker:
    profiles: ["leetcode"]
    image: leetcode-service:latest
    depends_on:
      leetcode-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://leetcode-db:5432/leetcodedb
      SPRING_DATASOURCE_USERNAME: leetcodeuser
      SPRING_DATASOURCE_PASSWORD: leetcodepass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-platform}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-platformpass}
      LEETCODE_ROLE: worker
      SERVER_PORT: "8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [kong-net]

volumes:
  leetcode_data:
  rabbitmq_data:

networks:
  kong-net:
    driver: bridge
