spring.application.name=leetcode-service
jwt.secret=${JWT_SECRET:change-me-super-secret-jwt-signing-key-min-32-bytes-0123456789}
jwt.issuer=${JWT_ISSUER:springboot-auth}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/leetcodedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:leetcodeuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:leetcodepass}

# Existing developer volumes predate Flyway. Keep local/Compose startup compatible;
# production overrides this with SPRING_JPA_HIBERNATE_DDL_AUTO=validate.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:platform}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:platformpass}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=${JUDGE_PREFETCH:1}
spring.rabbitmq.listener.simple.concurrency=${JUDGE_CONCURRENCY:1}

leetcode.role=${LEETCODE_ROLE:api}
leetcode.outbox.delay-ms=${OUTBOX_DELAY_MS:500}
leetcode.messaging.relay-enabled=${LEETCODE_RELAY_ENABLED:true}
leetcode.messaging.consumer-max-attempts=${LEETCODE_CONSUMER_MAX_ATTEMPTS:5}
leetcode.judge.stale-after=${LEETCODE_JUDGE_STALE_AFTER:2m}
leetcode.judge.reconcile-delay-ms=${LEETCODE_RECONCILE_DELAY_MS:30000}
leetcode.judge.reconcile-batch-size=${LEETCODE_RECONCILE_BATCH_SIZE:100}
leetcode.runner.timeout-seconds=${RUNNER_TIMEOUT_SECONDS:5}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
