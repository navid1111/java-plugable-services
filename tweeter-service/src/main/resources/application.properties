spring.application.name=tweeter-service
jwt.secret=${JWT_SECRET:change-me-super-secret-jwt-signing-key-min-32-bytes-0123456789}
jwt.issuer=${JWT_ISSUER:springboot-auth}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postsdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postsuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postspass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration/service
workload.jwt.issuer=tweeter-service
workload.jwt.secret=${WORKLOAD_JWT_SECRET:dev-tweeter-workload-secret-0123456789abcdef}
workload.jwt.trusted-callers=${WORKLOAD_TRUSTED_CALLERS:post-search-service=dev-search-workload-secret-0123456789abcdef,comment-service=dev-comment-workload-secret-0123456789abcdef,media-service=dev-media-workload-secret-0123456789abcdef}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.username=${RABBITMQ_USERNAME:platform}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:platform-dev}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
