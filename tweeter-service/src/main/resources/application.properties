spring.application.name=tweeter-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postsdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postsuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postspass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration/service
