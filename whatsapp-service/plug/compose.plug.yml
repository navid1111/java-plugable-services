services:
  chats-db:
    image: postgres:16-alpine
    container_name: chats-db
    environment:
      POSTGRES_USER: chatsuser
      POSTGRES_DB: chatsdb
      POSTGRES_PASSWORD: chatspass
    volumes:
      - whatsapp_chats_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatsuser -d chatsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  whatsapp-service:
    image: whatsapp-service:latest
    container_name: whatsapp-service
    depends_on:
      chats-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://chats-db:5432/chatsdb
      SPRING_DATASOURCE_USERNAME: chatsuser
      SPRING_DATASOURCE_PASSWORD: chatspass
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  whatsapp_chats_data:
