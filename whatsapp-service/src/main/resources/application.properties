spring.application.name=whatsapp-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chatsdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:chatsuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:chatspass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# RabbitMQ: confirmed, mandatory, persistent publishing for the outbox relay.
# The broker is used only for external-reaction events; message delivery is DB + WebSocket.
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.username=${RABBITMQ_USERNAME:platform}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:platformpass}
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true
chat.messaging.relay-enabled=${CHAT_MESSAGING_RELAY_ENABLED:true}
jwt.secret=${JWT_SECRET:change-me-super-secret-jwt-signing-key-min-32-bytes-0123456789}
jwt.issuer=${JWT_ISSUER:springboot-auth}
